# Data configuration
data:
  n_samples: 5000
  random_seed: 42
  
# Preprocessing configuration
preprocessing:
  scaler_type: "standard"  # standard, minmax, robust
  test_size: 0.2
  random_seed: 42
  
# Model configuration
model:
  random_seed: 42
  
  # Neural network configuration
  neural_network:
    hidden_sizes: [64, 32, 16]
    dropout_rate: 0.3
    learning_rate: 0.001
    batch_size: 32
    epochs: 100
    patience: 10
    
# Evaluation configuration
evaluation:
  metrics: ["accuracy", "precision", "recall", "f1_score", "roc_auc"]
  
# Visualization configuration
visualization:
  style: "seaborn-v0_8"
  save_plots: true
  plot_format: "png"
  plot_dpi: 300
